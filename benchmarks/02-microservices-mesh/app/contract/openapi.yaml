openapi: 3.0.3
info:
  title: Event-Driven Microservices Mesh contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /events:
    post:
      responses:
        '200': {description: Ingest and enrich event}
  /flows/{id}:
    get:
      responses:
        '200': {description: Read flow state}
  /notifications/stub:
    post:
      responses:
        '200': {description: Record notification attempt}
