openapi: 3.0.3
info:
  title: Autoscaling Burst API contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /api/v1/products/{productId}:
    get:
      responses:
        '200': {description: Read priced product}
