openapi: 3.0.3
info:
  title: Streaming Analytics Pipeline contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /events:
    post:
      responses:
        '200': {description: Ingest streaming event}
  /windows/{key}:
    get:
      responses:
        '200': {description: Read rolling window aggregate}
  /lag:
    get:
      responses:
        '200': {description: Read simulated lag}
