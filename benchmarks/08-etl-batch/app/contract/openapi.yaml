openapi: 3.0.3
info:
  title: ETL Batch Job contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /job/schema:
    get:
      responses:
        '200': {description: Read ETL schemas}
  /job/run:
    post:
      responses:
        '200': {description: Run local ETL job}
  /job/status:
    get:
      responses:
        '200': {description: Read latest job status}
