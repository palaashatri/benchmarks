openapi: 3.0.3
info:
  title: Polyglot Service Baseline contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /rules/evaluate:
    post:
      responses:
        '200': {description: Evaluate pricing rules}
  /rules/modes:
    get:
      responses:
        '200': {description: Read available rule modes}
  /scripts/validate:
    post:
      responses:
        '200': {description: Validate script payload}
