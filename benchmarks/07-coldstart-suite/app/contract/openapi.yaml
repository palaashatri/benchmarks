openapi: 3.0.3
info:
  title: Coldstart Function Suite contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /functions:
    get:
      responses:
        '200': {description: List local functions}
  /invoke/{function}:
    post:
      responses:
        '200': {description: Invoke a function}
