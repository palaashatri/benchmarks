openapi: 3.0.3
info:
  title: Large Monolith contract
  version: 0.2.0
paths:
  /health:
    get:
      responses:
        '200': {description: healthy}
  /metrics:
    get:
      responses:
        '200': {description: prometheus metrics}
  /actuator/health:
    get:
      responses:
        '200': {description: actuator health}
  /actuator/prometheus:
    get:
      responses:
        '200': {description: actuator prometheus metrics}
  /api/customers/{id}:
    get:
      responses:
        '200': {description: Read customer graph}
  /api/orders:
    post:
      responses:
        '200': {description: Create monolith order}
  /api/reports/daily:
    get:
      responses:
        '200': {description: Run daily report}
